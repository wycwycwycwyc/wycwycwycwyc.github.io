<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Login Page">登录页面</title>
    <script src="/config/serverUrl.js"></script>
    <script src="/js/script4_goBackOrHome.js"></script>
    <script src="/js/script3_darkMode.js"></script>
    <link rel="stylesheet" href="/css/styles3_animation.css">
    <script src="/js/script5_setAnimations.js"></script>
    <link rel="stylesheet" href="/css/styles4_eyeCare.js.css">
    <script src="/js/script8_setEyeCare.js"></script>
    <link rel="stylesheet" href="/css/styles5_brightness.css">
    <link rel="stylesheet" href="/css/styles6_glow.css">
    <script src="/js/script9_setbrightness.js"></script>
    <script src="/js/script10_setGlow.js"></script>
    <script src="https://hcaptcha.com/1/api.js" async defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.js"></script>
    <link rel="stylesheet" href="./style.css">
    <script src="/js/script14_setLanguage.js"></script>
</head>

<body>
    <div class="login-container">
        <button class="back-btn" onclick="goBackOrHome()" data-en="Back">返回</button>
        <h2 data-en="Login">登录</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username" data-en="Username/Email">用户名/邮箱</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password" data-en="Password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="h-captcha" data-sitekey="646c3294-ce44-4d5a-a04a-e1603366ea8c"></div>
            <div class="form-group">
                <button type="submit" data-en="Login">登录</button>
            </div>
            <div class="error" id="error"></div>
            <div class="verifying" id="verifying" data-en="Verifying...">正在验证...</div>
            <div class="form-group">
                <p><span data-en="No account? ">还没有账户？</span><a href="/account/Register"
                        data-en="Register one">注册一个</a><span data-en="! or ">!，或者</span><a
                        href="/account/forgotPassword" data-en="Forgot Password">忘记密码</a><span data-en="?">？</span></p>
            </div>
        </form>
    </div>
</body>
<script src="./Login.js"></script>

</html>
