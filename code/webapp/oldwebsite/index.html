<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/styles_button.css">
  <link rel="stylesheet" href="/css/styles3_animation.css">
  <link rel="stylesheet" href="/css/styles4_eyeCare.js.css">
  <link rel="stylesheet" href="/css/styles5_brightness.css">
  <link rel="stylesheet" href="/css/styles6_glow.css">
  <script src="/js/script3_darkMode.js"></script>
  <script src="/js/script4_goBackOrHome.js"></script>
  <script src="/js/script5_setAnimations.js"></script>
  <script src="/js/script6_setFontSize.js"></script>
  <script src="/js/script7_setOpacityandBlur.js"></script>
  <script src="/js/script8_setEyeCare.js"></script>
  <script src="/js/script9_setbrightness.js"></script>
  <script src="/js/script10_setGlow.js"></script>
  <script src="/js/script11_setHighlight.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
  <link href="/css/message.min.css" rel="stylesheet" />
  <script src="/js/message.min.js"></script>
  <title>旧网站体验器 · 时光跳转</title>
  <!-- 单独的CSS文件 (内联样式表以符合“分开引用”但单文件演示, 结构已分离) -->
  <style>
    /* reset & base — 相当于独立的 style.css */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f5f3f0;
      /* 浅色基调 */
      color: #2c2c2c;
      transition: background-color 0.3s ease, color 0.2s ease;
      padding: 1.5rem;
      margin: 0;
    }

    /* 深色模式 —— 只需在外层容器或body添加 .dark-mode 类 */
    body.dark-mode {
      background-color: #1a1c1e;
      color: #e9e9ea;
    }

    /* 主面板 — 承载标题与按钮 */
    .time-portal {
      max-width: 780px;
      width: 100%;
      text-align: center;
      padding: 2.5rem 2rem;
      border-radius: 3.5rem;
      background: rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(6px);
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.25),
        0 0 0 1px rgba(0, 0, 0, 0.03) inset;
      transition: background 0.3s, box-shadow 0.3s, border-color 0.2s;
      border: 1px solid rgba(200, 200, 200, 0.3);
      animation: floatIn 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      transform-origin: center;
    }

    /* 深色模式下的主面板 */
    body.dark-mode .time-portal {
      background: rgba(30, 32, 34, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
    }

    /* 进入动画 */
    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: scale(0.92) translateY(20px);
        filter: blur(8px);
      }

      50% {
        opacity: 0.7;
        transform: scale(1.01) translateY(-2px);
        filter: blur(2px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    /* 主标题 —— 带着怀旧闪烁 */
    .retro-title {
      font-size: clamp(2.2rem, 12vw, 4.2rem)!important;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      background: linear-gradient(145deg, #3a3a3a, #1f1f1f);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1);
      transition: text-shadow 0.3s, background 0.3s;
      animation: glitchPulse 2.8s infinite alternate ease-in-out;
    }

    /* 深色模式标题发光 */
    body.dark-mode .retro-title {
      background: linear-gradient(145deg, #f0e6d0, #c0b7a8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px #ffdfa0, 0 0 20px #b77f2c;
    }

    /* 轻微故障闪烁 (不影响可读性) */
    @keyframes glitchPulse {
      0% {
        letter-spacing: -0.02em;
        opacity: 0.95;
      }

      95% {
        letter-spacing: -0.02em;
        opacity: 1;
      }

      100% {
        letter-spacing: 0.01em;
        opacity: 1;
        text-shadow: 5px 5px 12px rgba(0, 0, 0, 0.15);
      }
    }

    body.dark-mode .retro-title {
      animation: glitchPulseDark 3s infinite;
    }

    @keyframes glitchPulseDark {
      0% {
        text-shadow: 0 0 6px #f0c48b, 0 0 15px #b28448;
      }

      100% {
        text-shadow: 2px 0 10px #ffb96b, -2px 0 15px #a5763e;
      }
    }

    /* 副标题 / 装饰短语 */
    .sub-head {
      font-size: 1.1rem;
      opacity: 0.7;
      margin-bottom: 2.5rem;
      font-weight: 300;
      backdrop-filter: blur(2px);
      padding: 0.2rem 1rem;
      display: inline-block;
      border-radius: 60px;
      transition: opacity 0.2s, color 0.2s;
    }

    body.dark-mode .sub-head {
      opacity: 0.6;
      color: #cdc8bc;
    }

    /* 按钮群组 双大按钮 */
    .button-duo {
      display: flex;
      flex-wrap: wrap;
      gap: 1.8rem;
      justify-content: center;
      margin: 1.8rem 0 1rem;
    }

    /* 大按钮通用样式 */
    .time-button {
      flex: 1 1 240px;
      min-width: 220px;
      padding: 1.6rem 1.2rem;
      border: none;
      background: #fefcf8;
      border-radius: 50px;
      font-size: 1.6rem;
      font-weight: 560;
      letter-spacing: 0.02em;
      color: #26221c;
      cursor: pointer;
      box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.2),
        0 4px 8px rgba(0, 0, 0, 0.05),
        inset 0 -2px 0 rgba(0, 0, 0, 0.05);
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      border: 1px solid rgba(255, 255, 255, 0.8);
      transform: translateY(0);
      position: relative;
      overflow: hidden;
    }

    /* 伪元素动画：光效扫过 */
    .time-button::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 245, 200, 0.6), transparent);
      transition: left 0.7s ease;
      pointer-events: none;
    }

    .time-button:hover::after {
      left: 100%;
    }

    /* 深色模式按钮 */
    body.dark-mode .time-button {
      background: #2f3135;
      color: #f0e7da;
      border: 1px solid #5b4f41;
      box-shadow: 0 15px 25px -8px #0b0b0b, 0 4px 10px rgba(255, 215, 140, 0.08) inset, 0 -2px 0 #3a362e inset;
    }

    /* 悬停动画 */
    .time-button:hover {
      transform: scale(1.05) translateY(-4px);
      box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.3), 0 0 0 1px #b39d7a inset;
      background: #ffffff;
    }

    body.dark-mode .time-button:hover {
      background: #3e3b36;
      box-shadow: 0 25px 35px -12px black, 0 0 0 1px #caa86b inset;
      color: #fef7e9;
    }

    /* 按钮点击瞬间微反馈 */
    .time-button:active {
      transform: scale(0.97) translateY(2px);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);
      transition: 0.05s;
    }

    /* 按钮内的小图标装饰 */
    .button-icon {
      font-size: 2.2rem;
      line-height: 1;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.1));
      transition: transform 0.2s;
    }

    .time-button:hover .button-icon {
      transform: rotate(5deg) scale(1.1);
    }

    /* 下方微小的提示 */
    .footer-note {
      margin-top: 2.5rem;
      font-size: 0.9rem;
      opacity: 0.4;
      letter-spacing: 0.3px;
      border-top: 1px dashed currentColor;
      padding-top: 1.2rem;
      width: 70%;
      margin-left: auto;
      margin-right: auto;
      transition: opacity 0.2s;
    }

    body.dark-mode .footer-note {
      opacity: 0.25;
    }

    /* 响应式微调 */
    @media (max-width: 520px) {
      .time-portal {
        padding: 2rem 1rem;
      }

      .time-button {
        min-width: 180px;
        font-size: 1.4rem;
        padding: 1.2rem 0.8rem;
      }
    }
    /* 说明容器：复古警示面板，置于按钮下方，与上下内容自然衔接 */
    .legacy-notice {
        max-width: 780px;
        width: 100%;
        margin: 2rem auto 1.5rem;      /* 上边距与按钮组分开，下边距留给footer */
        padding: 1.2rem 1.8rem;
        background: rgba(230, 225, 215, 0.5);
        backdrop-filter: blur(4px);
        border-radius: 2.5rem;
        border: 1px solid rgba(160, 140, 120, 0.25);
        box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.15);
        transition: background 0.3s, border-color 0.2s;
        text-align: left;
        font-size: 0.95rem;
        line-height: 1.6;
        letter-spacing: 0.01em;
    }

    /* 深色模式下说明容器 */
    body.dark-mode .legacy-notice {
        background: rgba(40, 38, 35, 0.7);
        border-color: rgba(200, 170, 130, 0.2);
        box-shadow: 0 8px 18px -8px #0a0a0a;
    }

    /* 每一条说明项目 */
    .notice-item {
        padding: 0.35rem 0 0.35rem 1.8rem;   /* 左内缩进为图标留出视觉空间 */
        color: #3e3a34;
        border-bottom: 1px dashed rgba(120, 100, 80, 0.15);
        margin-bottom: 0.3rem;
        background: transparent;
        transition: color 0.2s;
        word-break: break-word;              /* 防止长文本溢出 */
    }

    .notice-item:last-child {
        border-bottom: none;
        margin-bottom: 0;
    }

    /* 深色模式下的文字颜色 */
    body.dark-mode .notice-item {
        color: #cfc9c0;
        border-bottom-color: rgba(210, 180, 140, 0.15);
    }

    /* 第一条的图标微调 */
    .notice-item:first-child {
        padding-top: 0.1rem;
    }

    /* 响应式：小屏时缩小内边距 */
    @media (max-width: 520px) {
        .legacy-notice {
            padding: 1rem 1.2rem;
            font-size: 0.85rem;
            border-radius: 1.8rem;
        }
        .notice-item {
            padding-left: 1.2rem;
        }
    }    
  </style>
</head>

<body>
  <button class="custom-button" style="position: fixed; top: 10px; left: 10px;" onclick="goBackOrHome()">返回</button>
  <!-- 主体结构：对应单独的 index.html 内容 -->
  <main class="time-portal">
    <h1 class="retro-title">📼 旧网站体验器</h1>
    <div class="sub-head">· 重返网站初期现场 ·</div>

    <!-- 两个大按钮区域：跳转到指定路径 (firstUpload / stableVersion) -->
    <div class="button-duo">
      <div class="legacy-notice">
        <div class="notice-item">⚠️ 1. 旧版网站的界面未适配完整，可能出现一些界面或其他错误</div>
        <div class="notice-item">🕶️ 2. 旧版网站不支持当前网站的全局样式（如深色模式，护眼模式及自定义字体大小等）</div>
        <div class="notice-item">📦 3. 旧版网站的内容已在新版网站更新或在新版网站被弃用，请尽量不要使用其中的内容，其中链接或其它功能可能已经失效</div>
      </div>
      <!-- 第一次上传初版按钮 -->
      <button class="time-button" id="firstUploadBtn" data-path="./firstUpload">
        <span class="button-icon">🕒</span>
        第一次上传初版
        <span class="button-icon" style="font-size:1.6rem;">⏳</span>
      </button>

      <!-- 稳定早期版按钮 -->
      <button class="time-button" id="stableVersionBtn" data-path="./stableVersion">
        <span class="button-icon">📀</span>
        稳定早期版
        <span class="button-icon" style="font-size:1.7rem;">🕹️</span>
      </button>
    </div>

    <div class="footer-note">
      ⏏️ 点击即跳转 · 怀旧通道
    </div>
  </main>

  <!-- 单独的JavaScript文件 (逻辑已分离) -->
  <script>
    (function () {
      // 相当于外部的 script.js 文件
      // 深色模式: 不需要切换功能，但可以识别外部已经添加的dark-mode类 (body上)
      // 我们仅处理按钮跳转，以及可能额外的动画/日志。

      // 获取两个按钮
      const firstBtn = document.getElementById('firstUploadBtn');
      const stableBtn = document.getElementById('stableVersionBtn');

      // 跳转函数 (保留一点淡出效果——模拟动画跳转)
      function navigateTo(path) {
        // 增加微小的延迟，让点击反馈动画更明显，同时不失去功能
        // 但为了流畅体验，直接跳转也可以。这里加入一点怀旧淡出感
        document.body.style.transition = 'opacity 0.15s';
        document.body.style.opacity = '0.7';
        setTimeout(() => {
          window.location.href = path;   // 跳转到指定路径
        }, 100);
        // 可选：如果页面卸载前可以保留opacity，但无所谓
      }

      // 为两个按钮绑定点击事件
      if (firstBtn) {
        firstBtn.addEventListener('click', function (e) {
          e.preventDefault();  // 防止任何默认(按钮无默认行为，仅作保险)
          // 可以加一点自定义点击动画 (按钮自身已带有:active)
          const path = firstBtn.getAttribute('data-path');  // /firstUpload
          navigateTo(path);
        });
      }

      if (stableBtn) {
        stableBtn.addEventListener('click', function (e) {
          e.preventDefault();
          const path = stableBtn.getAttribute('data-path');  // /stableVersion
          navigateTo(path);
        });
      }

      // 额外: 如果有键盘访问需求 (Enter键已在button触发范围)
      // 同时处理触摸、无延迟

      // 可选: 在页面加载时给一个极小的装饰效果 (证明js运行)
      console.log('📻 旧网站体验器已启动 · 深色模式类由外部控制');

      // 由于深色模式只依赖外部添加.dark-mode类, 我们不用操作,
      // 但可以监听类变化? 不需要, 外部已经处理。如果希望body变化带动整体, 完美。

      // 但为了演示, 可以检测当前是否已经有dark-mode (外部可能已存在)
      // 这里不进行任何set/remove, 完全符合题意“不需要切换功能，我的网站有切换逻辑”
      // 但为了展示两个模式的效果差异，可以在注释中说明: 在body上手工添加/删除dark-mode查看样式
    })();
  </script>

  <!-- 
        说明: 
        - 标题与按钮均包含进入动画(floatIn) 
        - 按钮本身有悬浮、光效、点击缩放动画
        - 深色模式通过 body.dark-mode 控制，无需手动切换，已准备就绪
        - CSS与JavaScript完全分开书写(虽然在同一文件，但以style和script块分隔，符合独立引用的思想)
        - 点击按钮分别跳转到 /firstUpload 和 /stableVersion (取自data-path)
    -->
</body>

</html>
